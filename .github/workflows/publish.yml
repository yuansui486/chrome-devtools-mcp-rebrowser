name: Publish to npm
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test-install:
    uses: ./.github/workflows/test-install.yml

  publish:
    needs: test-install
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm publish --provenance --access public
